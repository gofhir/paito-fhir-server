services:
  paito:
    image: ghcr.io/gofhir/paito-fhir-server:latest
    container_name: paito-fhir
    restart: unless-stopped
    ports:
      - "3500:3500"   # FHIR API
      - "3501:3501"   # Admin API
    environment:
      STORAGE_DRIVER: postgres
      POSTGRES_HOST: postgres
      POSTGRES_USER: paito
      POSTGRES_PASSWORD: paito
      POSTGRES_DB: paito
      FHIR_VERSION: R4
      AUTH_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - paito_data:/app/data
    networks:
      - paito-network

  postgres:
    image: postgres:16-alpine
    container_name: paito-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paito
      POSTGRES_PASSWORD: paito
      POSTGRES_DB: paito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paito -d paito"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paito-network

volumes:
  postgres_data:
  paito_data:

networks:
  paito-network:
    driver: bridge
