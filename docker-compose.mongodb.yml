services:
  paito:
    image: ghcr.io/gofhir/paito-fhir-server:latest
    container_name: paito-fhir
    restart: unless-stopped
    ports:
      - "3500:3500"
      - "3501:3501"
    environment:
      STORAGE_DRIVER: mongodb
      MONGODB_URI: "mongodb://paito:paito@mongodb:27017/paito?authSource=admin"
      MONGODB_DATABASE: paito
      POSTGRES_HOST: postgres
      POSTGRES_USER: paito
      POSTGRES_PASSWORD: paito
      POSTGRES_DB: paito
      FHIR_VERSION: R4
      AUTH_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - paito_data:/app/data
    networks:
      - paito-network

  postgres:
    image: postgres:16-alpine
    container_name: paito-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paito
      POSTGRES_PASSWORD: paito
      POSTGRES_DB: paito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paito -d paito"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paito-network

  mongodb:
    image: mongo:7
    container_name: paito-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: paito
      MONGO_INITDB_ROOT_PASSWORD: paito
      MONGO_INITDB_DATABASE: paito
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paito-network

volumes:
  postgres_data:
  mongodb_data:
  paito_data:

networks:
  paito-network:
    driver: bridge
